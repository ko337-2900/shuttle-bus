<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>ODPT CORS Test</title><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;line-height:1.6}pre{background:#f5f5f5;padding:10px;overflow:auto}</style></head><body><h2>ODPT GTFS-Realtime CORSテスト</h2><p>TOKENを書き換えて実行してください。</p><button id="btn">テスト開始</button><pre id="log"></pre><script type="module">
const TOKEN="ここにアクセストークン";
const URL=`https://api.odpt.org/api/v4/gtfs/realtime/SeibuBus_trip_update?acl:consumerKey=${TOKEN}`;
const out=document.getElementById('log');
const w=t=>out.textContent+=t+"\n";
document.getElementById('btn').onclick=async()=>{
out.textContent="";
try{
const r=await fetch(URL);
w("HTTP Status: "+r.status);
w("Response Type: "+r.type);
const b=await r.arrayBuffer();
w("受信サイズ: "+b.byteLength+" bytes");
if(b.byteLength>0){w("✅ CORS OK");w("✅ データ取得成功");}
}catch(e){w("❌ "+e);if(String(e).includes("Failed to fetch"))w("CORSの可能性があります。");}
}
</script></body></html>
